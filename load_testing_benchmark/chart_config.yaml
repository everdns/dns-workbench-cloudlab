# Fixed tool style registry for charts.
# Each tool maps to an index into the color/marker/linestyle palettes.
# This ensures consistent styling across runs regardless of which tools are present.
# To add a new tool, assign it the next available index.

tool_styles:
  dnsperf: 0
  dnsperf-dnsworkbench-slice: 1
  dnsperf-dnsworkbench-lencse: 2
  dnspyre: 3
  dnspyre-dnsworkbench: 4
  dns64perf++: 5
  dns64perfpp-dnsworkbench: 6
  kxdpgun: 7
  kxdpgun-dnsworkbench: 8